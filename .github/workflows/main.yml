name: Single Runner Deployment Simulation

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  run-simulation:
    # Target your specific runner here
    runs-on: [self-hosted, runner-01]

    steps:
      - name: 1. Checkout Repository
        uses: actions/checkout@v4

      - name: 2. Create Directory and File
        run: |
          echo "Step: Initialize"
          # Using absolute paths to avoid permission issues in relative directories
          mkdir -p "${{ github.workspace }}/simulation_workspace"
          echo "this is a simulation" > "${{ github.workspace }}/simulation_workspace/config.txt"
          echo "Created ${{ github.workspace }}/simulation_workspace/config.txt"

      - name: 3. Test File Content
        run: |
          echo "Step: Testing..."
          if grep -q "this is a simulation" "${{ github.workspace }}/simulation_workspace/config.txt"; then
            echo "Verification successful: Content matches."
          else
            echo "Verification failed: Content mismatch."
            exit 1
          fi

      - name: 4. Simulate Deployment
        run: |
          echo "Step: Deploying..."
          # Creating the deployment target using the absolute workspace path
          mkdir -p "${{ github.workspace }}/deploy_target"
          cp "${{ github.workspace }}/simulation_workspace/config.txt" "${{ github.workspace }}/deploy_target/verified_config.txt"
          echo "Deployment of verified_config.txt completed."

      - name: 5. Final Cleanup
        if: always()
        run: |
          echo "Cleaning up workspace..."
          # Cleanup only the temporary simulation workspace
          rm -rf "${{ github.workspace }}/simulation_workspace"name: Remote Deployment to VPS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest  # This is the GitHub-hosted runner

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Executing remote ssh commands using ssh-action
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOST_IP }}
          username: ${{ secrets.HOST_USERS }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            # 1. Navigate to the project directory
            cd /home/${{ secrets.HOST_USERS }}/cicd_jenkins_gaction || git clone https://github.com/${{ github.repository }}.git
            
            # 2. Enter folder and pull latest code
            cd cicd_jenkins_gaction
            git pull origin main
            
            # 3. Deploy using Docker Compose
            docker compose up --build -d
            
            # 4. Cleanup old unused images to save VPS space
            docker image prune -f
