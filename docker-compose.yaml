services:
  flask-app:
    build: .
    container_name: devops-demo-app
    restart: always
    ports:
      - "7000:7000"  # [Host Port] : [Container Port]
    environment:
      - FLASK_ENV=production
      - PYTHONUNBUFFERED=1
    # Adding healthcheck ensures Jenkins/GitHub Actions knows when it's actually ready
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7000/"]
      interval: 30s
      timeout: 10s
      retries: 3
